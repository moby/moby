name: Changelog Proposer

on:
  pull_request:
    types: [labeled]

permissions:
  contents: read
  models: read

jobs:
  check-changelog:
    if: github.event.label.name == 'impact/changelog'
    runs-on: ubuntu-latest
    outputs:
      exists: ${{ steps.check.outputs.exists }}
    steps:
      - name: Check if changelog already exists
        id: check
        env:
          PR_BODY: |
            ${{ github.event.pull_request.body }}
        run: |
          block=$(echo -n "$PR_BODY" | tr -d '\r' | awk '/^```markdown changelog$/{flag=1;next}/^```$/{flag=0}flag')
          desc=$(echo "$block" | awk NF)
          if [ -n "$desc" ]; then
            echo "Changelog already present in PR body, skipping."
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

  propose-changelog:
    needs: check-changelog
    if: needs.check-changelog.outputs.exists != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      models: read
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: .github/prompts

      - name: Get PR information
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          PR_URL="https://github.com/${{ github.repository }}/pull/${PR_NUMBER}"
          gh pr view "$PR_URL" --json title,body,files > pr_metadata.json
          gh pr diff "$PR_URL" > pr.diff

      - name: Build prompt input
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
        run: |
          {
            echo "## PR #${PR_NUMBER}: ${PR_TITLE}"
            echo "Author: ${PR_AUTHOR}"
            echo ""
            echo "## Description"
            jq -r '.body // "No description provided."' pr_metadata.json
            echo ""
            echo "## Changed Files"
            jq -r '.files[].path' pr_metadata.json
            echo ""
            echo "## Diff (truncated)"
            echo '```diff'
            head -c 20000 pr.diff
            echo '```'
          } > prompt-input.md

          echo "Prompt input size: $(wc -c < prompt-input.md) bytes"

      - name: Run model
        id: inference
        uses: actions/ai-inference@e09e65981758de8b2fdab13c2bfb7c7d5493b0b6 # v2.0.7
        with:
          model: openai/gpt-4.1
          system-prompt-file: .github/prompts/changelog-proposer-system.txt
          prompt-file: ./prompt-input.md
          max-completion-tokens: "2000"

      - name: Print response
        if: always()
        run: |
          echo "=== Model Response ==="
          cat "${{ steps.inference.outputs.response-file }}"

      - name: Post result
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          RESPONSE_FILE: ${{ steps.inference.outputs.response-file }}
        run: |
          if grep -q '^NO_CHANGELOG:' "$RESPONSE_FILE"; then
            reason=$(sed -n 's/^NO_CHANGELOG: *//p' "$RESPONSE_FILE")
            echo "No changelog needed: $reason"
            gh pr comment "$PR_NUMBER" \
              --repo "${{ github.repository }}" \
              --body "🤖 **No changelog needed**: $reason"
            gh pr edit "$PR_NUMBER" \
              --repo "${{ github.repository }}" \
              --remove-label "impact/changelog"
          else
            gh pr comment "$PR_NUMBER" \
              --repo "${{ github.repository }}" \
              --body-file "$RESPONSE_FILE"
          fi

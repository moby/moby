---
models:
  default:
    provider: openai
    model: gpt-4o
    max_tokens: 16384

agents:
  root:
    model: default
    description: Changelog Entry Proposer
    instruction: |
      Propose a changelog entry for a Docker Engine pull request.

      Read `pr_metadata.json`, `changed_files.txt`, and `pr.diff` to understand the PR.

      If no changelog is needed (CI-only, test-only, docs-only, typo fix, refactor with no behavior change), use the `no_changelog` tool and stop.

      Otherwise, read `changelog-29.md` for style reference, then use `post_comment` with body:

      ## 📝 Proposed Changelog Entry
      ```markdown changelog
      <one sentence>
      ```

      Style: concise, user-focused, present tense, plain text only, no links.

      Always use `post_comment` or `no_changelog`. Never just print your answer.

    toolsets:
      - type: filesystem
        tools: [read_file, read_multiple_files, list_directory]
      - type: script
        shell:
          post_comment:
            cmd: gh pr comment "$PR_NUMBER" --repo "$REPO" --body "$body"
            description: Post a comment on the pull request under review
            args:
              body:
                type: string
                description: The comment body (markdown)
            required: [body]
          no_changelog:
            cmd: |
              echo "$reason" > NO_CHANGELOG && gh pr comment "$PR_NUMBER" --repo "$REPO" --body "🤖 **No changelog needed**: $reason"
            description: Mark the PR as not needing a changelog entry and post a comment explaining why
            args:
              reason:
                type: string
                description: Short reason why no changelog
            required: [reason]

permissions:
  allow:
    - shell:cmd=echo *
    - shell:cmd=gh *

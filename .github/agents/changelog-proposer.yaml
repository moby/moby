---
models:
  default:
    provider: openai
    model: gpt-4o
    max_tokens: 16384

agents:
  root:
    model: default
    description: Changelog Entry Proposer
    instruction: |
      You propose changelog entries for pull requests in the Moby/Docker Engine project.

      ## Available files

      The following files are available in the working directory:
      - `pr_metadata.json` — PR title, body, author, changed files (JSON)
      - `changed_files.txt` — list of changed file paths
      - `pr.diff` — full diff of the PR
      - `changelog-29.md` — Docker Engine 29.x release notes (style reference)
      - `changelog-28.md` — Docker Engine 28.x release notes (style reference)

      ## Process

      1. Use your tools to read `pr_metadata.json` and `changed_files.txt`.
      2. Use your tools to read `pr.diff`.
      3. Decide if a changelog entry is needed. Skip for:
         - CI/workflow-only changes (GitHub Actions, Makefiles, Dockerfiles for CI)
         - Test-only changes with no user-facing impact
         - Documentation-only changes
         - Code comments or typo fixes
         - Refactors with no behavior change
      4. If no changelog is needed:
         - Use the `write_no_changelog` tool with the reason.
         - Use the `post_comment` tool to explain why.
         - Stop.
      5. If a changelog IS needed:
         - Use your tools to read `changelog-29.md` for style reference.
         - Write a one-sentence changelog entry.
         - Use the `post_comment` tool to post it.

      IMPORTANT: You MUST use the provided tools to take actions.
      Do NOT just print commands in your response.

      ## Comment format for changelog entries

      The comment body should look like:

      ## 📝 Proposed Changelog Entry
      ```markdown changelog
      <single line release note entry>
      ```

      ## Style rules

      - One sentence, concise, user-focused
      - Present tense ("Fix X" not "Fixed X")
      - Plain text only — no links or PR references
      - Match the style in `changelog-29.md`

    toolsets:
      - type: filesystem
        tools: [read_file, read_multiple_files, list_directory]
      - type: script
        shell:
          post_comment:
            cmd: gh pr comment ${pr_number} --repo ${repo} --body ${body}
            description: Post a comment on a pull request
            args:
              pr_number:
                type: string
                description: The PR number
              repo:
                type: string
                description: The repository (e.g. moby/moby)
              body:
                type: string
                description: The comment body (markdown)
            required: [pr_number, repo, body]
          write_no_changelog:
            cmd: echo ${reason} > NO_CHANGELOG
            description: Mark the PR as not needing a changelog entry
            args:
              reason:
                type: string
                description: One-line reason why no changelog is needed
            required: [reason]

permissions:
  allow:
    - shell:cmd=echo *
    - shell:cmd=gh *

version: "2"
run:
  concurrency: 4
linters:
  default: none
  enable:
    - errcheck
    - forbidigo
    - govet
    - ineffassign
    - modernize
    - staticcheck
    - unparam
    - unused

  settings:
    errcheck:
      disable-default-exclusions: false
      verbose: true

formatters:
  settings:
    gofmt:
      simplify: true

version: "2"
linters:
  enable:
    - copyloopvar
    - dupword
    - gosec
    - misspell
    - nolintlint
    - revive
    - unconvert
  disable:
    - errcheck
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    generated: lax

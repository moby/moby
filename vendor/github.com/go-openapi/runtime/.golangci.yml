version: "2"
linters:
  default: all
  disable:
    - depguard
    - err113 # disabled temporarily: there are just too many issues to address
    - exhaustruct
    - funlen
    - gochecknoglobals
    - gochecknoinits
    - gocognit
    - godot
    - godox
    - gomoddirectives # moved to mono-repo, multi-modules, so replace directives are needed
    - gomodguard
    - gomodguard_v2
    - gosmopolitan
    - inamedparam
    - ireturn # this repo adopted a pattern where there are quite many returned interfaces. To be challenged with v2
    - musttag
    - nilerr # nilerr crashes on this repo
    - nlreturn
    - noinlineerr
    - nonamedreturns
    - paralleltest
    - recvcheck
    - testpackage
    - thelper
    - tparallel
    - varnamelen
    - whitespace
    - wrapcheck
    - wsl
    - wsl_v5
  settings:
    dupl:
      threshold: 200
    goconst:
      min-len: 2
      min-occurrences: 3
    cyclop:
      max-complexity: 25
    gocyclo:
      min-complexity: 25
    gocognit:
      min-complexity: 35
    exhaustive:
      default-signifies-exhaustive: true
      default-case-required: true
    lll:
      line-length: 180
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    paths:
      - .worktrees
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - gofmt
    - goimports
  settings:
    # local prefixes regroup imports from these packages
    goimports:
      local-prefixes:
        - github.com/go-openapi
  exclusions:
    generated: lax
    paths:
      - .worktrees
      - third_party$
      - builtin$
issues:
  # Maximum issues count per one linter.
  # Set to 0 to disable.
  # Default: 50
  max-issues-per-linter: 0
  # Maximum count of issues with the same text.
  # Set to 0 to disable.
  # Default: 3
  max-same-issues: 0
